version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: umd_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./downloads:/app/downloads
    environment:
      - ENVIRONMENT=production
      - CORS_ORIGINS=http://localhost:8080,http://localhost:5500,http://127.0.0.1:5500
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: umd_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped
